<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" fill="none">
  <rect width="1200" height="780" fill="#f8fafc"/>
  <text x="60" y="78" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">FitNotes Icon Direction 6</text>
  <text x="60" y="115" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Notebook spine + subtle dumbbell mark. Flat, simple, scalable.</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .label { fill: #0f172a; font: 700 18px Inter, Segoe UI, Arial, sans-serif; }
      .note { fill: #64748b; font: 500 14px Inter, Segoe UI, Arial, sans-serif; }
      .bg { fill: #0f172a; }
      .paper { fill: #f8fafc; }
      .paper2 { fill: #e2e8f0; }
      .accent { fill: #0284c7; }
      .ink { fill: #0f172a; }
    </style>
  </defs>

  <!-- Option A -->
  <g transform="translate(80 170)">
    <rect x="0" y="0" width="220" height="220" rx="52" class="bg" filter="url(#shadow)"/>
    <rect x="64" y="46" width="106" height="128" rx="18" class="paper"/>
    <rect x="50" y="54" width="30" height="112" rx="15" class="accent"/>
    <rect x="92" y="82" width="52" height="8" rx="4" class="paper2"/>
    <rect x="92" y="105" width="40" height="8" rx="4" class="paper2"/>
    <g transform="translate(88 134)">
      <rect x="10" y="12" width="44" height="8" rx="4" class="ink"/>
      <rect x="0" y="6" width="16" height="20" rx="5" class="accent"/>
      <rect x="48" y="6" width="16" height="20" rx="5" class="accent"/>
    </g>
    <text x="0" y="270" class="label">A. Strong Notebook</text>
    <text x="0" y="296" class="note">Most literal logbook; small gym cue.</text>
  </g>

  <!-- Option B -->
  <g transform="translate(360 170)">
    <rect x="0" y="0" width="220" height="220" rx="52" fill="#111827" filter="url(#shadow)"/>
    <rect x="58" y="42" width="116" height="136" rx="24" fill="#e0f2fe"/>
    <path d="M58 66C58 52.745 68.745 42 82 42H91V178H82C68.745 178 58 167.255 58 154V66Z" fill="#0284c7"/>
    <rect x="106" y="76" width="40" height="7" rx="3.5" fill="#0f172a" opacity="0.2"/>
    <rect x="98" y="99" width="56" height="7" rx="3.5" fill="#0f172a" opacity="0.2"/>
    <circle cx="123" cy="138" r="19" fill="#0284c7"/>
    <rect x="108" y="135" width="30" height="6" rx="3" fill="#f8fafc"/>
    <rect x="103" y="131" width="10" height="14" rx="3" fill="#f8fafc"/>
    <rect x="133" y="131" width="10" height="14" rx="3" fill="#f8fafc"/>
    <text x="0" y="270" class="label">B. Badge Mark</text>
    <text x="0" y="296" class="note">Softer and more app-store friendly.</text>
  </g>

  <!-- Option C -->
  <g transform="translate(640 170)">
    <rect x="0" y="0" width="220" height="220" rx="48" fill="#f8fafc" stroke="#cbd5e1" stroke-width="8" filter="url(#shadow)"/>
    <rect x="54" y="42" width="118" height="138" rx="20" fill="#0f172a"/>
    <rect x="75" y="42" width="16" height="138" rx="8" fill="#0284c7"/>
    <path d="M108 79H144" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
    <path d="M108 104H135" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <path d="M103 140L116 153L147 119" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="270" class="label">C. Workout Complete</text>
    <text x="0" y="296" class="note">More “tracking app” than gym brand.</text>
  </g>

  <!-- Option D -->
  <g transform="translate(920 170)">
    <rect x="0" y="0" width="220" height="220" rx="52" fill="#0b1220" filter="url(#shadow)"/>
    <path d="M70 50H159C169.493 50 178 58.507 178 69V168C178 173.523 173.523 178 168 178H70C54.536 178 42 165.464 42 150V78C42 62.536 54.536 50 70 50Z" fill="#f8fafc"/>
    <path d="M70 50H87V178H70C54.536 178 42 165.464 42 150V78C42 62.536 54.536 50 70 50Z" fill="#0284c7"/>
    <path d="M111 85H149" stroke="#0f172a" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    <path d="M111 109H139" stroke="#0f172a" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    <path d="M108 148H152" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <path d="M99 141V155" stroke="#0284c7" stroke-width="10" stroke-linecap="round"/>
    <path d="M161 141V155" stroke="#0284c7" stroke-width="10" stroke-linecap="round"/>
    <text x="0" y="270" class="label">D. Spine + Bar</text>
    <text x="0" y="296" class="note">Cleanest fitness signal at small sizes.</text>
  </g>

  <g transform="translate(80 560)">
    <rect x="0" y="0" width="1040" height="120" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="30" y="42" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Recommendation</text>
    <text x="30" y="76" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">D is the strongest app icon: simple silhouette, clear logbook identity, and the barbell reads even at launcher size.</text>
  </g>
</svg>
