<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Vibrant, premium Indigo/Violet linear gradient for weights -->
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Accent cyan glow gradient for highlight highlights -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Metallic steel gradient for bar -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    
    <!-- Premium drop shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background Dark Circle for pop/contrast -->
  <circle cx="50" cy="50" r="46" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- Barbell Bar in center, tilted at 45 degrees for dynamic energy -->
  <g transform="rotate(-45 50 50)" filter="url(#glow)">
    <!-- Central Bar -->
    <rect x="20" y="46" width="60" height="8" rx="4" fill="url(#barGrad)" />

    <!-- Left Weight Plates -->
    <rect x="30" y="32" width="6" height="36" rx="3" fill="url(#plateGrad)" />
    <rect x="22" y="36" width="6" height="28" rx="2" fill="url(#plateGrad)" opacity="0.9" />
    <rect x="14" y="42" width="6" height="16" rx="1" fill="url(#accentGrad)" />

    <!-- Right Weight Plates -->
    <rect x="64" y="32" width="6" height="36" rx="3" fill="url(#plateGrad)" />
    <rect x="72" y="36" width="6" height="28" rx="2" fill="url(#plateGrad)" opacity="0.9" />
    <rect x="80" y="42" width="6" height="16" rx="1" fill="url(#accentGrad)" />

    <!-- Inner Collars/Locks -->
    <rect x="36" y="44" width="3" height="12" rx="1.5" fill="#f8fafc" />
    <rect x="61" y="44" width="3" height="12" rx="1.5" fill="#f8fafc" />
  </g>
</svg>
